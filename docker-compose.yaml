services:
  ceph:
    build: .
    environment:
      RGW_PORT: "8080"
      RGW_ACCESS_KEY: "testaccesskey"
      RGW_SECRET_KEY: "testsecretkey"
      RGW_USERS: "user1:access1:secret1;user2:access2:secret2"
    ports:
      - "8080:8080"
      - "8445:8443"

  smoke:
    image: amazon/aws-cli
    depends_on:
      ceph:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: "testaccesskey"
      AWS_SECRET_ACCESS_KEY: "testsecretkey"
      AWS_DEFAULT_REGION: "default"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Ceph is healthy, running smoke test..."
        aws s3 ls --endpoint-url http://ceph:8080
        echo "Smoke test passed."
